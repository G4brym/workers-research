<!-- This is the HTML that your API should return when /api/research/generate-questions is called -->
<!-- Copy this structure for your backend API response -->

<div class="bg-white rounded-lg shadow-sm border border-gray-200 p-6">
    <div class="mb-6">
        <h3 class="text-lg font-semibold text-gray-900 mb-2">Follow-up Questions</h3>
        <p class="text-sm text-gray-600">
            Based on your research question, please answer these follow-up questions to help us provide more targeted insights.
        </p>
    </div>

    <div class="space-y-6">
        <!-- Question 1 - Text Input -->
        <div class="question-item">
            <label class="block text-sm font-medium text-gray-700 mb-2">
                <span class="question-text">What specific industry or sector are you most interested in focusing on?</span>
                <span class="text-red-500 ml-1">*</span>
            </label>
            <input
                type="text"
                name="followup_1"
                class="w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-blue-500"
                placeholder="e.g., Technology, Healthcare, Finance, Manufacturing..."
                required
            >
        </div>

        <!-- Question 2 - Select Dropdown -->
        <div class="question-item">
            <label class="block text-sm font-medium text-gray-700 mb-2">
                <span class="question-text">What is your primary role or perspective in relation to this research?</span>
                <span class="text-red-500 ml-1">*</span>
            </label>
            <select
                name="followup_2"
                class="w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-blue-500"
                required
            >
                <option value="">Select your role...</option>
                <option value="business_owner">Business Owner/Entrepreneur</option>
                <option value="manager">Manager/Executive</option>
                <option value="researcher">Academic/Researcher</option>
                <option value="consultant">Consultant</option>
                <option value="investor">Investor</option>
                <option value="student">Student</option>
                <option value="other">Other</option>
            </select>
        </div>

        <!-- Question 3 - Textarea -->
        <div class="question-item">
            <label class="block text-sm font-medium text-gray-700 mb-2">
                <span class="question-text">Are there any specific challenges or pain points you're trying to address with this research?</span>
                <span class="text-red-500 ml-1">*</span>
            </label>
            <textarea
                name="followup_3"
                rows="3"
                class="w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-blue-500 resize-none"
                placeholder="Describe the specific problems or questions you're hoping this research will help solve..."
                required
            ></textarea>
        </div>

        <!-- Question 4 - Multiple Choice (Radio) -->
        <div class="question-item">
            <label class="block text-sm font-medium text-gray-700 mb-3">
                <span class="question-text">What is your preferred timeline for implementing insights from this research?</span>
                <span class="text-red-500 ml-1">*</span>
            </label>
            <div class="space-y-2">
                <label class="flex items-center">
                    <input type="radio" name="followup_4" value="immediate" class="mr-2 text-blue-600 focus:ring-blue-500" required>
                    <span class="text-sm text-gray-700">Immediate (within 1 month)</span>
                </label>
                <label class="flex items-center">
                    <input type="radio" name="followup_4" value="short_term" class="mr-2 text-blue-600 focus:ring-blue-500" required>
                    <span class="text-sm text-gray-700">Short-term (1-6 months)</span>
                </label>
                <label class="flex items-center">
                    <input type="radio" name="followup_4" value="medium_term" class="mr-2 text-blue-600 focus:ring-blue-500" required>
                    <span class="text-sm text-gray-700">Medium-term (6-12 months)</span>
                </label>
                <label class="flex items-center">
                    <input type="radio" name="followup_4" value="long_term" class="mr-2 text-blue-600 focus:ring-blue-500" required>
                    <span class="text-sm text-gray-700">Long-term (1+ years)</span>
                </label>
            </div>
        </div>

        <!-- Question 5 - Checkboxes -->
        <div class="question-item">
            <label class="block text-sm font-medium text-gray-700 mb-3">
                <span class="question-text">Which types of data sources would be most valuable for your research? (Select all that apply)</span>
            </label>
            <div class="space-y-2">
                <label class="flex items-center">
                    <input type="checkbox" name="followup_5" value="market_reports" class="mr-2 text-blue-600 focus:ring-blue-500">
                    <span class="text-sm text-gray-700">Industry reports and market analysis</span>
                </label>
                <label class="flex items-center">
                    <input type="checkbox" name="followup_5" value="case_studies" class="mr-2 text-blue-600 focus:ring-blue-500">
                    <span class="text-sm text-gray-700">Company case studies</span>
                </label>
                <label class="flex items-center">
                    <input type="checkbox" name="followup_5" value="academic_research" class="mr-2 text-blue-600 focus:ring-blue-500">
                    <span class="text-sm text-gray-700">Academic research and papers</span>
                </label>
                <label class="flex items-center">
                    <input type="checkbox" name="followup_5" value="news_trends" class="mr-2 text-blue-600 focus:ring-blue-500">
                    <span class="text-sm text-gray-700">Recent news and trends</span>
                </label>
                <label class="flex items-center">
                    <input type="checkbox" name="followup_5" value="expert_opinions" class="mr-2 text-blue-600 focus:ring-blue-500">
                    <span class="text-sm text-gray-700">Expert opinions and interviews</span>
                </label>
            </div>
        </div>

        <!-- Question 6 - Number Input -->
        <div class="question-item">
            <label class="block text-sm font-medium text-gray-700 mb-2">
                <span class="question-text">What is your approximate budget range for implementing solutions based on this research? (Optional)</span>
            </label>
            <select
                name="followup_6"
                class="w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-blue-500"
            >
                <option value="">Prefer not to say</option>
                <option value="under_10k">Under $10,000</option>
                <option value="10k_50k">$10,000 - $50,000</option>
                <option value="50k_100k">$50,000 - $100,000</option>
                <option value="100k_500k">$100,000 - $500,000</option>
                <option value="over_500k">Over $500,000</option>
            </select>
        </div>
    </div>

    <!-- Action Buttons -->
    <div class="flex justify-end gap-3 mt-8 pt-6 border-t border-gray-200">
        <button
            type="button"
            onclick="document.getElementById('followup-section').innerHTML = ''; document.getElementById('initial-query').focus();"
            class="px-4 py-2 text-sm font-medium text-gray-700 bg-white border border-gray-300 rounded-md hover:bg-gray-50"
        >
            ← Back to Query
        </button>
        <button
            type="button"
            id="start-research-btn"
            class="px-6 py-2 text-sm font-medium text-white bg-green-600 rounded-md hover:bg-green-700 focus:outline-none focus:ring-2 focus:ring-green-500 transition-colors"
        >
            Start Deep Research
        </button>
    </div>
</div>
